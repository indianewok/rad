# RAD uses std::filesystem, which libc++ marks as "introduced in macOS 10.15".
# bioconda's default osx-64 deployment target is 10.13, so raise it to 10.15
# for Intel macOS only. osx-arm64 already targets >= 11.0, so it is unaffected.
c_stdlib_version:   # [osx and x86_64]
  - "10.15"          # [osx and x86_64]
